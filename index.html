<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>将棋タイトル戦 データベース</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>将棋タイトル戦 データベース</h2>

<!-- タブメニュー -->
<div class="tabs">
    <button class="tab-button active" onclick="switchTab('tab-yearly', this)">年度別結果</button>
    <button class="tab-button" onclick="switchTab('tab-match', this)">棋戦別結果</button>
    <button class="tab-button" onclick="switchTab('tab-player', this)">棋士別結果</button>
    <button class="tab-button" onclick="switchTab('tab-ranking', this)">ランキング</button>
</div>

<!-- タブコンテンツ1: 年度別結果 -->
<div id="tab-yearly" class="tab-content active">
    <div class="control-panel">
        <label for="yearSelect">表示年度：</label>
        <select id="yearSelect" onchange="renderYearlyTable()">
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>期</th>
                <th>棋戦</th>
                <th>保持者</th>
                <th>勝数</th>
                <th>星取り</th>
                <th>勝数</th>
                <th>挑戦者</th>
            </tr>
        </thead>
        <tbody id="yearlyBody">
        </tbody>
    </table>
</div>

<!-- タブコンテンツ2: 棋戦別結果 -->
<div id="tab-match" class="tab-content">
    <div class="control-panel">
        <label for="matchSelect">表示棋戦：</label>
        <select id="matchSelect" onchange="renderMatchTable()">
            <option value="竜王戦">竜王戦</option>
            <option value="名人戦">名人戦</option>
            <option value="叡王戦">叡王戦</option>
            <option value="王位戦">王位戦</option>
            <option value="王座戦">王座戦</option>
            <option value="棋聖戦">棋聖戦</option>
            <option value="王将戦">王将戦</option>
            <option value="棋王戦">棋王戦</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>期</th>
                <th>年度</th>
                <th>保持者</th>
                <th>勝数</th>
                <th>星取り</th>
                <th>勝数</th>
                <th>挑戦者</th>
            </tr>
        </thead>
        <tbody id="matchBody">
        </tbody>
    </table>
</div>

<!-- タブコンテンツ3: 棋士別結果 -->
<div id="tab-player" class="tab-content">
    <div class="control-panel player-vs-panel">
        <select id="playerASelect" onchange="renderPlayerTable()"></select>
        <span class="vs-text">VS</span>
        <select id="playerBSelect" onchange="renderPlayerTable()"></select>
    </div>

    <div id="playerStats" style="display: none;"></div>

    <table>
        <thead>
            <tr>
                <th>年度</th>
                <th>期</th>
                <th>棋戦</th>
                <th>対局相手</th>
                <th>勝敗</th>
                <th>星取り</th>
                <th>結果</th>
            </tr>
        </thead>
        <tbody id="playerBody">
        </tbody>
    </table>
</div>

<!-- タブコンテンツ4: ランキング -->
<div id="tab-ranking" class="tab-content">
    <div class="control-panel">
        <label for="sortSelect">並べ替え基準：</label>
        <select id="sortSelect" onchange="renderRanking()">
            <option value="count">獲得の多い順</option>
            <option value="appear">登場の多い順</option>
            <option value="lose">敗退の多い順</option>
            <option value="rate">勝率の高い順</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>順位</th>
                <th>棋士名</th>
                <th>登場</th>
                <th>獲得</th>
                <th>敗退</th>
                <th>勝率</th>
            </tr>
        </thead>
        <tbody id="rankingBody">
        </tbody>
    </table>
</div>

<script src="title.js"></script>
</body>
</html>
